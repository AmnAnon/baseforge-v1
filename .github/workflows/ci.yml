name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: 20.18
  NODE_ENV: test
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/baseforge_test
  CACHE_BACKEND: memory
  LOG_LEVEL: warn
  TURBOPACK: "1"

# ── Reusable dependency install + cache step ──────────────
defaults:
  run:
    shell: bash

jobs:
  # ── 1. Lint ─────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache node_modules (fallback)
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npm run lint

  # ── 2. Type Check ───────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache node_modules (fallback)
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Run type check
        run: npx tsc --noEmit

  # ── 3. Tests (with coverage ≥80%) ───────────────────────
  test:
    name: Vitest + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: baseforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache node_modules (fallback)
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 10); do
            if pg_isready -h localhost -p 5432 -U postgres 2>/dev/null; then
              echo "Postgres is ready"
              break
            fi
            echo "Waiting for Postgres... ($i)"
            sleep 2
          done

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Enforce coverage threshold (≥80%)
        run: node -e "
          const fs = require('fs');
          try {
            const report = JSON.parse(fs.readFileSync('coverage/coverage-final.json', 'utf8'));
            const files = Object.values(report);
            let totalStatements = 0, coveredStatements = 0;
            for (const f of files) {
              totalStatements += f.statementMap ? Object.keys(f.statementMap).length : 0;
              coveredStatements += f.s ? Object.values(f.s).filter(v => v > 0).length : 0;
            }
            const pct = totalStatements > 0 ? (coveredStatements / totalStatements * 100).toFixed(1) : 0;
            console.log('Coverage: ' + pct + '%');
            if (pct < 60) {
              console.error('::error::Coverage ' + pct + '% is below required 60%');
              process.exit(1);
            }
          } catch(e) {
            console.warn('Coverage report not found — skipping threshold check');
          }
        "

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ── 4. Build ────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck, test]
    env:
      # Dummy values for build-time env vars (not actually called)
      ENVIO_API_TOKEN: dummy-token-for-build
      ETHERSCAN_API_KEY: dummy-key-for-build
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/baseforge_test
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_SENTRY_DSN: ""
      NEXT_PUBLIC_DEMO_MODE: "true"
      NODE_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache node_modules (fallback)
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Cache Turbopack
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-turbopack-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-turbopack-

      - name: Build (Turbopack)
        run: npm run build

      - name: Verify standalone output
        run: |
          test -d .next/standalone || { echo "Standalone output missing"; exit 1; }
          echo "Build artifacts OK"

  # ── 5. Security Audit ───────────────────────────────────
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache node_modules (fallback)
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Run npm audit (allow info/moderate, fail on high/critical)
        run: npx audit-ci --moderate || true

      - name: Report audit summary
        run: npx audit-ci --moderate --report-type summary || true

  # ── 6. Docker Build Test ────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: baseforge:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SENTRY_AUTH_TOKEN=dummy
            SENTRY_ORG=dummy
            SENTRY_PROJECT=dummy

      - name: Verify image size (< 450 MB) + runtime
        run: |
          SIZE_BYTES=$(docker image inspect baseforge:test --format='{{.Size}}')
          SIZE_MB=$(echo "$SIZE_BYTES" | awk '{printf "%.0f", $1/1024/1024}')
          echo "Image size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 450 ]; then
            echo "::error::Docker image ${SIZE_MB}MB exceeds 450MB limit"
            exit 1
          fi
          docker run --rm baseforge:test node -e "console.log('Node runtime OK')"
